name: Build Vite Site

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Show files
        run: ls -la

      - name: Commit dist
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add -A
          git commit -m "Auto build dist" || echo "No changes"
          git push
